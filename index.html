<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>中匡生物·丸时ECM</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--blue-900:#0B2948;--blue-800:#0D3B6E;--blue-700:#124E8A;--blue-600:#1A5CAF;
--blue-500:#2B7BD4;--blue-400:#4A9BE8;--blue-300:#7BB8F0;--blue-200:#B3D7F7;
--blue-100:#E0EFFC;--blue-50:#F0F7FE;
--green-600:#00845A;--green-500:#00A86B;--green-400:#34C88A;--green-100:#E6F9F0;
--purple-600:#5B35B0;--purple-500:#6B46C1;--purple-400:#8B6ED4;--purple-100:#F0EBF8;
--gray-900:#1A202C;--gray-800:#2D3748;--gray-700:#4A5568;--gray-600:#718096;
--gray-500:#A0AEC0;--gray-400:#CBD5E0;--gray-300:#E2E8F0;--gray-200:#EDF2F7;
--gray-100:#F7FAFC;--gray-50:#FAFCFE;
--bg:#F4F7FA;--card:#FFFFFF;--radius:14px;--radius-sm:10px;--radius-lg:20px;
--shadow:0 1px 3px rgba(11,41,72,.06),0 4px 16px rgba(11,41,72,.04);
--shadow-lg:0 4px 24px rgba(11,41,72,.08);
--font-display:'Noto Serif SC',serif;--font-body:'Noto Sans SC',sans-serif;
--safe-bottom:env(safe-area-inset-bottom,0px);
}
html{font-size:16px;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);color:var(--gray-800);background:#E8EDF3;line-height:1.6;overflow:hidden;height:100dvh;display:flex;justify-content:center;align-items:center}
.phone-frame{width:100%;max-width:430px;height:100dvh;max-height:932px;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 80px rgba(11,41,72,.15);display:flex;flex-direction:column}
@media(min-width:500px){.phone-frame{border-radius:32px;height:min(100dvh - 40px,932px);margin:20px 0}}
.status-bar{height:0;flex-shrink:0}
@media(min-width:500px){.status-bar{height:12px}}
/* NAV BAR */
.nav-bar{height:52px;flex-shrink:0;display:flex;align-items:center;padding:0 16px;background:var(--blue-600);position:relative;z-index:100}
.nav-bar.sub{background:var(--card);border-bottom:1px solid var(--gray-200)}
.nav-bar.sub .nav-title{color:var(--gray-900)}
.nav-back{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;color:inherit;border-radius:50%;transition:background .2s}
.nav-back:active{background:rgba(255,255,255,.15)}
.nav-bar.sub .nav-back{color:var(--gray-800)}
.nav-bar.sub .nav-back:active{background:var(--gray-100)}
.nav-back svg{width:22px;height:22px}
.nav-title{flex:1;text-align:center;font-size:17px;font-weight:600;color:#fff;letter-spacing:.3px;margin-right:36px}
.nav-bar.has-back .nav-title{margin-right:0}
/* SCROLL */
.page-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.page-scroll::-webkit-scrollbar{display:none}
/* TAB BAR */
.tab-bar{height:calc(56px + var(--safe-bottom));flex-shrink:0;background:var(--card);display:flex;align-items:flex-start;padding-top:6px;border-top:1px solid var(--gray-200);position:relative;z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:transform .15s}
.tab-item:active{transform:scale(.92)}
.tab-icon{width:26px;height:26px;display:flex;align-items:center;justify-content:center;position:relative}
.tab-icon svg{width:24px;height:24px;color:var(--gray-500);transition:color .2s}
.tab-item.active .tab-icon svg{color:var(--blue-600)}
.tab-label{font-size:10px;color:var(--gray-500);font-weight:500;transition:color .2s}
.tab-item.active .tab-label{color:var(--blue-600);font-weight:600}
/* PAGE TRANSITIONS */
.page{display:none;flex-direction:column;height:100%;position:absolute;inset:0;z-index:1}
.page.active{display:flex;z-index:2}
.page.sub-page{z-index:50;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin:0 16px 14px;box-shadow:var(--shadow)}
.card-sm{padding:16px}
.section-title{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--gray-900);display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-title::before{content:'';width:3px;height:18px;border-radius:2px;background:linear-gradient(180deg,var(--blue-600),var(--blue-400));flex-shrink:0}
.section-subtitle{font-size:12px;color:var(--gray-500);margin-bottom:12px}
/* HERO */
.hero{margin:0 16px 14px;border-radius:var(--radius-lg);overflow:hidden;position:relative;background:linear-gradient(135deg,var(--blue-900) 0%,var(--blue-700) 40%,var(--blue-500) 100%);padding:32px 24px 28px;color:#fff}
.hero::before{content:'';position:absolute;top:-30%;right:-20%;width:70%;height:140%;background:radial-gradient(ellipse,rgba(255,255,255,.06) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,rgba(11,41,72,.2));pointer-events:none}
.hero *{position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:500;margin-bottom:16px;letter-spacing:.5px}
.hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#34C88A;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero-title{font-family:var(--font-display);font-size:28px;font-weight:900;line-height:1.25;letter-spacing:1px;margin-bottom:6px}
.hero-slogan{font-size:15px;font-weight:300;opacity:.85;letter-spacing:3px;margin-bottom:4px}
.hero-sub{font-size:12px;opacity:.6;letter-spacing:1px}
/* PRODUCT PREVIEWS */
.product-grid{display:flex;gap:10px;margin-bottom:14px}
.product-preview{flex:1;border-radius:var(--radius);padding:16px 12px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.product-preview:active{transform:scale(.96)}
.product-preview::before{content:'';position:absolute;inset:0;background:inherit;opacity:.08;border-radius:inherit}
.pp-icon{width:48px;height:48px;border-radius:14px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:700;color:#fff;letter-spacing:1px}
.pp-name{font-size:13px;font-weight:600;color:var(--gray-800);display:block;margin-bottom:2px}
.pp-cat{font-size:10px;color:var(--gray-500)}
/* QUICK ENTRIES */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.quick-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;cursor:pointer;border-radius:var(--radius-sm);transition:background .2s}
.quick-item:active{background:var(--gray-100)}
.quick-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px}
.quick-label{font-size:11px;color:var(--gray-700);font-weight:500}
/* CONTACT */
.contact-row{display:flex;align-items:center;gap:12px;padding:12px 0;cursor:pointer}
.contact-row:not(:last-child){border-bottom:1px solid var(--gray-200)}
.contact-row .c-icon{width:32px;height:32px;border-radius:8px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.contact-row .c-text{flex:1;font-size:13px;color:var(--gray-700)}
.contact-row .c-action{font-size:12px;color:var(--blue-600);font-weight:600}
/* PRODUCT CARDS */
.product-card{border-radius:var(--radius-lg);overflow:hidden;margin:0 16px 16px;box-shadow:var(--shadow-lg);cursor:pointer;transition:transform .2s}
.product-card:active{transform:scale(.98)}
.pc-header{padding:24px 20px 20px;color:#fff;position:relative}
.pc-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:40%;background:linear-gradient(transparent,rgba(0,0,0,.1));pointer-events:none}
.pc-name{font-family:var(--font-display);font-size:22px;font-weight:900;position:relative;z-index:1}
.pc-tagline{font-size:12px;opacity:.8;margin-top:4px;position:relative;z-index:1;letter-spacing:1px}
.pc-body{background:var(--card);padding:18px 20px}
.pc-subtitle{font-size:12px;color:var(--blue-600);font-weight:600;margin-bottom:8px}
.pc-desc{font-size:13px;color:var(--gray-600);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pc-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--card);border-top:1px solid var(--gray-200)}
.pc-footer span{font-size:13px;color:var(--blue-600);font-weight:600}
.pc-footer svg{width:16px;height:16px;color:var(--blue-400)}
/* DETAIL PAGE */
.detail-hero{padding:28px 20px 24px;color:#fff;position:relative;margin:0 16px 14px;border-radius:var(--radius-lg);overflow:hidden}
.detail-hero::before{content:'';position:absolute;inset:0;background:inherit;z-index:0}
.dh-name{font-family:var(--font-display);font-size:26px;font-weight:900;position:relative}
.dh-subtitle{font-size:13px;opacity:.8;margin-top:4px;position:relative}
.dh-tagline{font-size:15px;font-weight:600;letter-spacing:2px;margin-top:10px;position:relative}
.dh-tag{display:inline-block;background:rgba(255,255,255,.18);border-radius:6px;padding:3px 10px;font-size:11px;margin-top:10px;position:relative}
/* TABS */
.detail-tabs{display:flex;margin:0 16px 14px;background:var(--card);border-radius:var(--radius-sm);padding:4px;box-shadow:var(--shadow)}
.dt-item{flex:1;text-align:center;padding:10px 0;font-size:13px;color:var(--gray-600);border-radius:8px;cursor:pointer;font-weight:500;transition:all .25s}
.dt-item.active{background:var(--blue-600);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(26,92,175,.3)}
/* FEATURE LIST */
.feat-item{display:flex;gap:10px;margin-bottom:12px;font-size:13px;color:var(--gray-700);line-height:1.65}
.feat-dot{width:6px;height:6px;border-radius:50%;background:var(--blue-500);margin-top:8px;flex-shrink:0}
.detail-text{font-size:13px;color:var(--gray-600);line-height:1.85;white-space:pre-wrap}
.divider{height:1px;background:var(--gray-200);margin:16px 0}
/* DEPT GRID */
.dept-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.dept-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px 10px;background:var(--gray-100);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s}
.dept-item:active{background:var(--blue-100);transform:scale(.95)}
.dept-icon{font-size:22px}
.dept-name{font-size:11px;color:var(--gray-700);text-align:center;font-weight:500;line-height:1.3}
/* ACTION ROW */
.action-row{display:flex;align-items:center;gap:14px;padding:14px 0;cursor:pointer}
.action-row:not(:last-child){border-bottom:1px solid var(--gray-200)}
.action-row:active{opacity:.7}
.ar-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ar-info{flex:1}
.ar-title{font-size:14px;font-weight:600;color:var(--gray-800)}
.ar-desc{font-size:11px;color:var(--gray-500);margin-top:2px}
.ar-arrow{color:var(--gray-400);font-size:18px}
/* ARTICLE */
.article-card{padding:16px 0;cursor:pointer;border-bottom:1px solid var(--gray-200)}
.article-card:last-child{border-bottom:none}
.article-card:active{opacity:.7}
.ac-title{font-size:14px;font-weight:600;color:var(--gray-900);line-height:1.5;margin-bottom:6px}
.ac-summary{font-size:12px;color:var(--gray-600);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.ac-meta{display:flex;align-items:center;justify-content:space-between}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.tag-blue{background:var(--blue-100);color:var(--blue-600)}
.tag-green{background:var(--green-100);color:var(--green-600)}
.tag-purple{background:var(--purple-100);color:var(--purple-600)}
.ac-date{font-size:11px;color:var(--gray-500)}
/* QA */
.qa-filters{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;-webkit-overflow-scrolling:touch}
.qa-filters::-webkit-scrollbar{display:none}
.qf-item{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;color:var(--gray-600);background:var(--card);cursor:pointer;border:1px solid var(--gray-200);transition:all .2s;font-weight:500}
.qf-item.active{background:var(--blue-600);color:#fff;border-color:var(--blue-600)}
.qa-item{margin:0 16px 10px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.qa-q{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer}
.qa-q:active{background:var(--gray-50)}
.qa-badge{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.qa-badge.q{background:var(--blue-600)}
.qa-badge.a{background:var(--green-500)}
.qa-qtext{flex:1;font-size:13px;font-weight:600;color:var(--gray-800)}
.qa-arrow{font-size:14px;color:var(--gray-400);transition:transform .25s}
.qa-arrow.open{transform:rotate(90deg)}
.qa-a{padding:0 16px 14px;display:flex;gap:10px}
.qa-atext{font-size:12.5px;color:var(--gray-600);line-height:1.75;white-space:pre-wrap}
/* FORM */
.form-section{margin:0 16px 14px;background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
.form-label{font-size:13px;font-weight:600;color:var(--gray-800);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.form-label .req{color:#E53E3E;font-size:14px}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-body);color:var(--gray-800);background:var(--gray-50);transition:border-color .2s;-webkit-appearance:none;appearance:none;outline:none}
.form-input:focus{border-color:var(--blue-500)}
.form-input::placeholder{color:var(--gray-400)}
.form-select{position:relative}
.form-select::after{content:'›';position:absolute;right:14px;top:50%;transform:translateY(-50%) rotate(90deg);color:var(--gray-400);font-size:16px;pointer-events:none}
.form-select select{width:100%;padding:10px 14px;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-body);color:var(--gray-800);background:var(--gray-50);-webkit-appearance:none;appearance:none;outline:none}
.form-textarea{min-height:100px;resize:vertical}
.form-group{margin-bottom:16px}
.gender-row{display:flex;gap:10px}
.gender-btn{flex:1;padding:10px;text-align:center;border:1.5px solid var(--gray-300);border-radius:var(--radius-sm);font-size:14px;cursor:pointer;background:var(--gray-50);color:var(--gray-600);transition:all .2s}
.gender-btn.active{border-color:var(--blue-500);background:var(--blue-50);color:var(--blue-600);font-weight:600}
.upload-row{display:flex;gap:10px;flex-wrap:wrap}
.upload-box{width:72px;height:72px;border:2px dashed var(--gray-300);border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--gray-400);font-size:22px;transition:border-color .2s}
.upload-box:active{border-color:var(--blue-400)}
.upload-box span{font-size:10px;margin-top:2px}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--blue-600),var(--blue-500));color:#fff;font-size:15px;font-weight:600;font-family:var(--font-body);cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 16px rgba(26,92,175,.3);transition:transform .15s,box-shadow .15s}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 8px rgba(26,92,175,.2)}
/* RECORD */
.record-card{margin:0 16px 12px;background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.rc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rc-title{font-size:14px;font-weight:600;color:var(--gray-800)}
.status{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600}
.status-pending{background:#FEFCE8;color:#CA8A04}
.status-approved{background:#ECFDF5;color:#059669}
.status-rejected{background:#FEF2F2;color:#DC2626}
.rc-meta{font-size:12px;color:var(--gray-500);line-height:1.6}
/* PROFILE */
.profile-header{background:linear-gradient(135deg,var(--blue-900),var(--blue-600),var(--blue-500));padding:40px 20px 30px;text-align:center;color:#fff;position:relative;margin:0 16px 14px;border-radius:var(--radius-lg);overflow:hidden}
.profile-header::before{content:'';position:absolute;top:-50%;right:-30%;width:80%;height:200%;background:radial-gradient(ellipse,rgba(255,255,255,.05) 0%,transparent 60%)}
.pf-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px;backdrop-filter:blur(4px)}
.pf-name{font-size:18px;font-weight:700}
.pf-role{font-size:12px;opacity:.7;margin-top:4px}
.menu-item{display:flex;align-items:center;gap:14px;padding:14px 0;cursor:pointer}
.menu-item:not(:last-child){border-bottom:1px solid var(--gray-200)}
.menu-item:active{opacity:.7}
.mi-icon{font-size:20px;width:28px;text-align:center}
.mi-text{flex:1;font-size:14px;color:var(--gray-800)}
.mi-arrow{color:var(--gray-400)}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card);border-radius:var(--radius-lg);padding:32px 24px 24px;width:85%;max-width:320px;text-align:center;animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.modal-icon{font-size:48px;margin-bottom:12px}
.modal-title{font-family:var(--font-display);font-size:18px;font-weight:700;margin-bottom:8px}
.modal-desc{font-size:13px;color:var(--gray-600);line-height:1.6;margin-bottom:20px}
.modal-btn{padding:12px 32px;border:none;border-radius:var(--radius-sm);background:var(--blue-600);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
/* ROLE PICKER */
.role-grid{display:flex;gap:12px}
.role-card{flex:1;padding:20px 12px;text-align:center;border:2px solid var(--gray-200);border-radius:var(--radius);cursor:pointer;transition:all .2s}
.role-card:active{border-color:var(--blue-500);background:var(--blue-50)}
.role-card .r-icon{font-size:32px;margin-bottom:8px}
.role-card .r-name{font-size:14px;font-weight:600;color:var(--gray-800)}
.role-card .r-desc{font-size:11px;color:var(--gray-500);margin-top:4px}
/* DEPT DETAIL */
.usage-box{font-size:13px;color:var(--gray-600);line-height:1.85;white-space:pre-wrap}
.recommend-row{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--gray-200)}
.recommend-row .rl{font-size:12px;color:var(--gray-500);font-weight:600}
/* ANIMATE ELEMENTS */
.anim-up{animation:fadeUp .4s ease both}
.anim-up:nth-child(2){animation-delay:.05s}
.anim-up:nth-child(3){animation-delay:.1s}
.anim-up:nth-child(4){animation-delay:.15s}
.anim-up:nth-child(5){animation-delay:.2s}
.pad-b{padding-bottom:16px}
.mb-12{margin-bottom:12px}
.mt-8{margin-top:8px}
.text-center{text-align:center}
.empty-state{padding:48px 20px;text-align:center}
.empty-icon{font-size:40px;margin-bottom:8px;display:block}
.empty-text{font-size:13px;color:var(--gray-500)}
.case-img-thumb{width:80px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--gray-100)}
.case-gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.case-gallery.single{grid-template-columns:1fr}
.case-gallery img{width:100%;border-radius:10px;display:block}
.info-grid{display:flex;gap:8px;background:var(--gray-100);border-radius:var(--radius-sm);padding:12px}

  deptGuides: {
    burn: { guide: '烧伤创面修复方案：\n\n推荐产品：小蓝管（急性期）+ 壹肌元/贰肌元（修复期）\n\n1. 急性期：清创后即刻使用小蓝管涂抹创面，加速退红及修复，预防色素沉着\n2. 炎症控制期：使用壹肌元导入，渗透深度0.5-0.8mm，3-4周一次\n3. 修复重建期：使用贰肌元配合微针导入，促进表皮化及真皮层修复\n\n临床循证：SIS ECM烧伤修复研究（Salgado等）：7天上皮成熟指数↑(6.2 vs 3.2)，TGF-β3表达↑(7.4 vs 2.1)，3个月瘢痕评分↓(3.6 vs 7.2)', products: ['小蓝管','壹肌元','贰肌元'] },
    beauty: { guide: '医学美容科/整形外科应用方案：\n\n一、光电术后即刻修复\n推荐产品：小蓝管\n术后即刻涂抹，3分钟阻断痒感痛感（TRPV1阻断技术）\n快速减痛、减少红肿、热烫感\n加速创面修复，减少误工和尴尬期\n减少色沉及瘢痕风险\n\n二、手术缝合切口\n推荐产品：小蓝管\n促进伤口ECM有序排列\n调节巨噬细胞极化\n抑制瘢痕增生、挛缩\n\n三、面部年轻化抗衰\n推荐产品：贰肌元\n操作方式：微针/黄金微针/点阵激光 + 贰肌元导入\n渗透深度0.5-1.0mm，4-6周一次，3-5次为一疗程\n\n四、炎症性皮肤问题管理\n推荐产品：壹肌元\n针对敏感肌、玫瑰痤疮、激素脸等，分层靶向抗炎修复\n3周一次，3次一疗程', products: ['小蓝管', '壹肌元', '贰肌元'] },
    derma: { guide: '皮肤科应用方案：\n\n一、光电治疗/光动力疗法\n推荐产品：小蓝管\n快速减痛、减少红肿、热烫感\n加速创面修复，减少误工和尴尬期\n减少瘙痒及色沉风险\n\n二、玫瑰痤疮\n推荐产品：壹肌元\n全面部6ml导入，渗透深度0.5-0.8mm，3-4周一次，疗程6个月\n注：慢性反复发作疾病，需密集持续治疗；疼痛、刺痒、潮红明显者搭配小蓝管\n\n三、激素依赖性皮炎\n推荐产品：壹肌元\n全面部6ml，深度<0.5mm，2周一次（涂抹可1周一次），疗程6-12个月\n联合居家戒断、皮脂膜修复\n\n四、痤疮（3-4型）及结节\n推荐产品：壹肌元\n全面部6ml/局部3ml，渗透深度0.5-1.0mm，3-4周/次，疗程3-6个月\n联合针清、M22 Acne、黄金微针\n快速控制皮肤炎症，调节皮肤结构，软化结节及增生瘢痕\n注：治疗顺序从无感染区→感染区\n\n五、皮肤屏障受损疾病\n推荐产品：壹肌元\n快速控制皮肤炎症，促进表皮修复再生，重建皮肤结构\n\n六、痘坑痘印修复\n推荐产品：贰肌元\n渗透深度0.5-1.2mm，4-6周一次，个体化疗程', products: ['小蓝管','壹肌元','贰肌元'] },
    anorectal: { guide: '肛肠科应用方案：\n\n推荐产品：小蓝管（术后创面修复）\n\n肛肠术后创面使用ECM材料可加速创面愈合、减轻术后疼痛、预防瘢痕形成。\n\n核心优势：\n- 快速缓解疼痛不适（TRPV1阻断技术）\n- 加速创面愈合，提高生活质量\n- ECM提取物调控M1/M2巨噬细胞比例，促进组织的建设性重塑而非破坏性炎症\n- 缩短修复期，便于护理\n- 抑制瘢痕形成，减少色沉\n\n使用方法：术后清洁创面后直接涂抹小蓝管，每日换药时使用，直至创面愈合。', products: ['小蓝管'] },
    emergency: { guide: '急诊外科/普外科应用方案：\n\n推荐产品：小蓝管\n\n一、手术切口（甲乳/面颈部/在意瘢痕者）\n促进伤口ECM有序排列\n调节巨噬细胞极化\n抑制瘢痕增生、挛缩\n\n二、开放性创面\n快速缓解疼痛不适\n加速创面愈合，提高生活质量\n缩短修复期，便于护理\n抑制瘢痕形成，减少色沉\n\n三、缺血伤口\n缺血风险可能导致难愈合创面\n促进血管化及再上皮化\n加速创面愈合\n\n核心优势：\n- ECM抑菌能力强，对大肠杆菌、金色葡萄球菌、结肠炎菌均有抑制作用，无耐药性\n- TRPV1阻断技术3分钟阻断痒感和痛感神经\n- 加速创面愈合，预防色素沉着和瘢痕形成\n- 更早介入，更少瘢痕', products: ['小蓝管'] },
    wound: { guide: '烧烫伤/创面中心/伤口中心应用方案：\n\n一、烧烫伤创面\n推荐产品：小蓝管\nI°及II°烧烫伤适用\n促进上皮成熟，减少增生疤痕，减少色沉色脱\n\n二、难愈合创面\n推荐产品：小蓝管 + 壹肌元\n促进血管化及再上皮化\n加速创面愈合，重建皮肤结构，减少瘢痕\n\n三、糖尿病足\n推荐产品：小蓝管\n临床预估2个月左右愈合的伤口，丸时小蓝管20天完成愈合\n促进血管化及再上皮化，加速创面愈合\n临床循证：糖尿病足溃疡RCT（73例）：12周愈合率49% vs 生长因子组28%\n\n四、褥疮\n推荐产品：小蓝管\n促进血管化及再上皮化，加速创面愈合，重建皮肤结构\n\n五、下肢静脉溃疡\n推荐产品：小蓝管\n临床循证：RCT 12周愈合率55% vs 单纯加压组34%（p=0.0196）\n\nECM材料通过多重机制加速修复：\n1. 提供生物支架，为细胞迁移和增殖提供三维结构\n2. 调控炎症反应，诱导M2型巨噬细胞促修复\n3. 促进血管新生，引导新生血管长入组织\n4. 抑菌能力强且无耐药性', products: ['小蓝管','壹肌元'] },
    ortho: { guide: '骨科应用方案：\n\n推荐产品：小蓝管（术后创面管理）\n\nSIS ECM在骨科领域的循证证据：\n- 韧带修复研究：细胞/ECM排列更有序，胶原纤维直径↑22.2%，V/I型胶原比例↓28.4%\n- 肌腱暴露修复：促周围细胞增殖，形成真皮样组织，无术后粘连/瘢痕挛缩\n\n术后创面管理：清创后涂抹小蓝管，加速愈合、预防瘢痕。', products: ['小蓝管'] },
    gastro: { guide: '胃肠外科应用方案：\n\n推荐产品：小蓝管（术后创面管理）\n\nSIS ECM在消化道领域的循证证据：\n- 食管重建（Badylak等，5例患者）：Barrett食管黏膜切除后使用SIS ECM，患者恢复正常鳞状上皮，恢复正常饮食\n\n术后切口使用小蓝管可加速创面修复，减少瘢痕形成。', products: ['小蓝管'] },
    thyroid: { guide: '甲状腺头颈外科应用方案：\n\n推荐产品：小蓝管（术后创面管理）+ 贰肌元（瘢痕预防）\n\n术后颈部切口使用小蓝管加速愈合、预防色沉。后期使用贰肌元配合微针导入，改善瘢痕外观。\n\n更早介入，更少瘢痕。', products: ['小蓝管','贰肌元'] },
    breast: { guide: '乳腺外科/甲乳外科应用方案：\n\n推荐产品：小蓝管（术后创面管理）+ 贰肌元（瘢痕修复）\n\n一、手术缝合\n推荐产品：小蓝管\n促进伤口ECM有序排列\n调节巨噬细胞极化\n抑制瘢痕增生、挛缩\n\n二、腋窝区域\n推荐产品：小蓝管\n该区域存在缺血风险，可能导致难愈合创面\n促进血管化及再上皮化，加速创面愈合\n\n三、乳晕周围\n推荐产品：小蓝管\n缺血风险区域，可能导致难愈合创面\n促进血管化及再上皮化，加速创面愈合\n\n四、放疗区域\n推荐产品：小蓝管\n放射性皮炎可出现疼痛、红斑、水肿、水疱、溃疡、坏死\n止痛、快速消肿，阻断进一步水肿炎症反应\n改善微循环，加速创面愈合\n\n后期瘢痕管理可使用贰肌元配合微针导入。', products: ['小蓝管','贰肌元'] },
    neuro: { guide: '神经外科应用方案：\n\n推荐产品：小蓝管（术后创面管理）\n\nSIS ECM在神经外科的循证证据：\n- 硬脑膜修复多中心研究（Bejjani等，59例患者）：平均随访7.3个月临床有效\n\n术后头皮切口使用小蓝管加速愈合、预防感染。ECM抑菌能力强且无耐药性。', products: ['小蓝管'] },
    pediatric: { guide: '儿科应用方案：\n\n推荐产品：小蓝管\n\n一、手术/光电术后\n快速缓解疼痛不适、减少哭闹\n缩短修复期，便于护理\n抑制瘢痕形成，减少色沉\n\n二、外伤/擦伤\n快速缓解疼痛不适、减少哭闹\n缩短修复期，便于护理\n抑制瘢痕形成，减少色沉\n\n三、湿疹皮炎（口周湿疹、红PP等）\n缓解瘙痒，减少搔抓\n减少哭闹不适\n快速抗炎愈合，抑制色沉\n\n四、蚊虫叮咬\n快速止痒\n快速消肿，阻断进一步水肿炎症反应\n\n安全性保障：\n- 丸时ECM提取物经山东省医学科学院药物研究所检测\n- 可降解、可吸收、无残留、无免疫原性\n- 无细胞毒性、无皮肤致敏性、无皮内刺激\n- TRPV1阻断技术可快速镇静疼痛，减少儿童不适', products: ['小蓝管'] },
    obstetric: { guide: '妇产科/产康应用方案：\n\n一、剖腹产伤口\n推荐产品：小蓝管\n促进伤口ECM有序排列\n调节巨噬细胞极化\n抑制瘢痕增生、粘连、瘙痒\n\n二、侧切/撕裂伤\n推荐产品：小蓝管\n快速缓解疼痛\n加速创面愈合\n恢复组织弹性、抑制瘢痕、纤维化及色素不均\n\n三、乳头皲裂\n推荐产品：小蓝管\n快速缓解疼痛\n加速愈合，恢复哺乳\n\n四、妊娠纹\n推荐产品：贰肌元\n产后红纹/紫纹：滚针+贰肌元，产后3个月即可开始，红纹期早干预效果更佳\n白纹：黄金微针+贰肌元，疗程半年以上\n阻断皮肤断裂及瘢痕加剧，重建腹部皮肤厚度及紧致\n\n临床案例参考：\n- 34岁，产后1个月，贰肌元3次，疗程3个月\n- 34岁，二胎双胞胎，产后2月，黄金微针3次+贰肌元3次，疗程半年\n- 50岁，产后30年，滚针+贰肌元仍可见改善\n- 26岁，产后3年，疗程12个月', products: ['小蓝管','贰肌元'] },

  articles: [
    {
      title: '《Cell》发布衰老新标志：抗衰从"细胞内部"迈入"ECM"时代',
      category: '前沿研究', date: '2024-12',
      summary: '2024年12月Cell发布衰老新标志，ECM硬化和功能丧失被纳入衰老核心标志。抗衰研究正式从"细胞内部"迈入"ECM"新时代。',
      content: '2024年12月，顶级学术期刊《Cell》发布了衰老的新标志（Hallmarks of Aging），其中ECM（细胞外基质）的硬化和功能丧失被正式纳入衰老的核心标志之一。\n\n这标志着衰老研究正式从关注"细胞内部"机制（如端粒缩短、线粒体功能障碍等）扩展到"细胞外部"的ECM微环境。\n\nECM是由细胞分泌的复杂网络结构，占人体质量的约1/3，为细胞提供结构支撑、信号传导和微环境调控。随着年龄增长，ECM发生交联、硬化、降解失衡，导致组织功能下降。\n\n这一发现为以ECM为靶点的抗衰和再生医学提供了全新的理论基础，也验证了丸时ECM产品线的技术路线前瞻性。'
    },
    {
      title: 'ECM在创面修复四阶段中的核心作用',
      category: '基础研究', date: '2024-10',
      summary: 'ECM在创面修复的止血期、炎症期、增殖期、重塑期四个阶段中发挥关键调控作用，是组织再生的核心枢纽。',
      content: '创面修复是一个复杂的生物学过程，包含四个有序但相互重叠的阶段：\n\n一、止血期\nECM提供纤维蛋白支架，促进血小板聚集和凝血级联反应。ECM中的胶原蛋白和纤连蛋白是血小板激活的关键触发因子。\n\n二、炎症期\nECM调控免疫细胞的募集和活化。关键机制是ECM降解产物可调控巨噬细胞从M1（促炎）向M2（促修复）表型转化，这是组织走向"建设性重塑"而非"破坏性炎症"的关键转折点。\n\n三、增殖期\nECM为成纤维细胞、内皮细胞和上皮细胞的迁移和增殖提供三维支架和生长因子库。ECM中储存的VEGF、FGF、TGF-β等生长因子在此阶段有序释放。\n\n四、重塑期\nECM引导胶原纤维的有序排列和交联，决定了修复组织的最终结构和功能质量。合理的ECM重塑可减少瘢痕形成，更接近正常组织结构。'
    },
    {
      title: 'ECM调控巨噬细胞极化：更早介入，更少瘢痕',

// ===== RENDER ENGINE =====
const $ = sel => document.querySelector(sel);
const app = $('#app');

function render() {
  const tabs = ['首页','产品','案例','我的'];
  const tabIcons = [ICONS.home, ICONS.product, ICONS.cases, ICONS.profile];
  app.innerHTML = `
    <div class="phone-frame">
      <div class="status-bar"></div>
      <div id="page-container" style="flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column"></div>
      <div class="tab-bar" id="tab-bar">
        ${tabs.map((t,i) => `
          <div class="tab-item${state.tab===i?' active':''}" data-tab="${i}">
            <div class="tab-icon">${tabIcons[i]}</div>
            <div class="tab-label">${t}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  renderPage();
  bindTabs();
}

function bindTabs() {
  document.querySelectorAll('.tab-item').forEach(el => {
    el.addEventListener('click', () => {
      const t = parseInt(el.dataset.tab);
      if (t !== state.tab) { state.tab = t; state.pageStack = []; renderPage(); updateTabActive(); }
    });
  });
}

function updateTabActive() {
  document.querySelectorAll('.tab-item').forEach((el,i) => {
    el.classList.toggle('active', i === state.tab);
  });
}

function renderPage() {
  const container = $('#page-container');
  if (state.pageStack.length > 0) {
    const top = state.pageStack[state.pageStack.length - 1];
    renderSubPage(container, top);
    $('#tab-bar').style.display = 'none';
  } else {
    $('#tab-bar').style.display = 'flex';
    const pages = [renderHome, renderProducts, renderCases, renderProfile];
    pages[state.tab](container);
  }
}

function pushPage(page) {
  state.pageStack.push(page);
  renderPage();
}

function popPage() {
  state.pageStack.pop();
  renderPage();
}

      <div class="nav-title">${title}</div>
    </div>
    <div class="page-scroll pad-b" style="animation:slideIn .25s ease">${bodyHtml}</div>
  `;
}

}

      <div class="form-group"><div class="form-label"><span class="req">*</span>案例标题</div><input class="form-input" id="f-title" placeholder="如：玫瑰痤疮壹肌元治疗3个月"></div>
      <div class="form-group"><div class="form-label"><span class="req">*</span>治疗描述</div><textarea class="form-input form-textarea" id="f-desc" placeholder="请详细描述治疗方案、疗程和效果"></textarea></div>
      <div class="form-group"><div class="form-label">术前照片</div><div class="upload-row"><div class="upload-box" onclick="fakeUpload()">+<span>上传</span></div></div></div>
      <div class="form-group"><div class="form-label">术后照片</div><div class="upload-row"><div class="upload-box" onclick="fakeUpload()">+<span>上传</span></div></div></div>
    </div>
    <div style="padding:0 16px 24px"><button class="btn-primary" onclick="submitFollowup()">提交随访案例</button></div>
    `}
  `);
}

let selectedGender = '';
function pickGender(el, g) {
  selectedGender = g;
  el.parentElement.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function fakeUpload() { showModal('提示','H5演示版暂不支持照片上传，正式小程序版本将支持此功能。'); }

function submitFollowup() {
  const doctor = $('#f-doctor')?.value?.trim();
  const hospital = $('#f-hospital')?.value?.trim();
  const dept = $('#f-dept')?.value;
  const product = $('#f-product')?.value;
  const title = $('#f-title')?.value?.trim();
  const desc = $('#f-desc')?.value?.trim();
  if (!doctor || !hospital || !dept || !product || !title || !desc) {
    showModal('提示','请填写所有必填项（带 * 标记的字段）。');
    return;
  }
  const pName = DATA.products.find(p=>p.id===product)?.name||product;
  const record = {
    id: Date.now(), doctorName: doctor, hospital, department: dept,
    phone: $('#f-phone')?.value||'', productName: pName, productId: product,
    age: $('#f-age')?.value||'', gender: selectedGender,
    diagnosis: $('#f-diagnosis')?.value||'',
    caseTitle: title, caseDesc: desc,
    status: 'pending', submitTime: new Date().toLocaleDateString('zh-CN')
  };
  state.followups.push(record);
  localStorage.setItem('wanshi_followups', JSON.stringify(state.followups));
  showModal('提交成功','您的案例已提交，等待审核。审核通过后将展示在对应科室的案例列表中。', () => popPage());
}

// -- Followup History --
function renderFollowupHistory(c) {
  const records = [...state.followups].reverse();
  const statusMap = {pending:{text:'待审核',cls:'status-pending'},approved:{text:'已通过',cls:'status-approved'},rejected:{text:'未通过',cls:'status-rejected'}};
  c.innerHTML = subPageShell('提交记录', `
    <div style="padding:14px 0 0"></div>
    ${records.length > 0 ? records.map(r => {
      const s = statusMap[r.status] || statusMap.pending;
      return `<div class="record-card">
        <div class="rc-header"><div class="rc-title">${r.caseTitle}</div><span class="status ${s.cls}">${s.text}</span></div>
        <div class="rc-meta">${r.productName} · ${r.hospital}<br>${r.submitTime}</div>
      </div>`;
    }).join('') : '<div class="empty-state"><span class="empty-icon">📑</span><span class="empty-text">暂无提交记录</span></div>'}
  `);
}

      <div class="contact-row"><div class="c-icon">📍</div><div class="c-text">${co.address}</div></div>

// -- Modal --
function showModal(title, desc, onClose) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box"><div class="modal-icon">✅</div><div class="modal-title">${title}</div><div class="modal-desc">${desc}</div><button class="modal-btn" onclick="this.closest('.modal-overlay').remove()">确定</button></div>`;
  overlay.querySelector('.modal-btn').addEventListener('click', () => { if (onClose) onClose(); });
  document.body.appendChild(overlay);
}

render();
